<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth0 Admin — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-xl border border-gray-200 p-8">
      <h1 class="text-xl font-semibold text-gray-900 text-center mb-1">Auth0 Admin</h1>
      <p class="text-sm text-gray-500 text-center mb-6">Enter the admin password to continue</p>

      <script>
        if (new URLSearchParams(window.location.search).has('error')) {
          document.write('<div class="mb-4 px-3 py-2 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">Incorrect password</div>');
        }
      </script>

      <form method="POST" action="/login">
        <input
          type="password"
          name="password"
          placeholder="Admin password"
          autofocus
          required
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm mb-4"
        >
        <button
          type="submit"
          class="w-full px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm font-medium"
        >
          Sign In
        </button>
      </form>
    </div>
  </div>
</body>
</html>
